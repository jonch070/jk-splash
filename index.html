<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jonathan Kawchuk — Composer & Sound Artist</title>
  <meta name="description" content="Composer, sound artist, field recordist. Founder of Quiet Parks International. Emmy-winning, 2x CASMA. Based in Canada.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' width='100' height='100'/><text y='70' x='50%' text-anchor='middle' fill='%23fff' font-size='60'>⛰</text></svg>">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    @font-face {
      font-family: 'Dax';
      src: url('fonts/Dax Regular/Dax Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #e8e6e1;
      --text: #1a1a1a;
      --text-muted: #666;
    }

    html {
      font-family: 'Dax', 'Space Mono', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .nav-hint {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #bundle-svg {
      width: 500px;
      height: 500px;
    }

    .node text {
      font-size: 10px;
      fill: var(--text-muted);
      cursor: pointer;
    }

    .node text:hover {
      fill: var(--text);
    }

    .link {
      fill: none;
      stroke: var(--text-muted);
      stroke-opacity: 0.3;
    }

    .node circle {
      fill: var(--text-muted);
      stroke: var(--bg);
      stroke-width: 2;
      cursor: pointer;
    }

    .node circle:hover {
      fill: var(--text);
    }

    .node.child circle {
      fill: var(--text);
    }

    .link--source, .link--target {
      stroke: #DC866A;
      stroke-opacity: 0.8;
    }

    @media (max-width: 600px) {
      #bundle-svg {
        width: 350px;
        height: 350px;
      }

      nav {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">Jonathan Kawchuk</a>
    <span class="nav-hint">click a node</span>
  </nav>

  <main>
    <svg id="bundle-svg"></svg>
  </main>

  <script>
    // ─── Data ──────────────────────────────────────────────────────
    // Only leaf nodes go here. Parent categories (work, writing, listening)
    // are created automatically from the dot notation.
    // "imports" = cross-branch connections (the curved edges).
    const data = [
      { name: "work.everywhen",          url: "/everywhen",      imports: ["work.installation", "listening.reelcrafted"] },
      { name: "work.north",              url: "/north",          imports: ["listening.reelcrafted"] },
      { name: "work.installation",       url: "/installation",   imports: ["work.everywhen"] },
      { name: "writing.protecting-quiet", url: "https://thenarwhal.ca/protecting-quiet-spaces-natural-sounds/", imports: ["listening.field-recording"] },
      { name: "listening.reelcrafted",   url: "https://play.reelcrafter.com/COSlb0PsRdWZ8v-mTQevfw", imports: ["work.everywhen", "work.north"] },
      { name: "listening.emp",           url: "https://emp.disco.ac/playlist-new/18442280?date=20240821&user_id=188042&signature=Hd2IqQansjJK2Iu9NEdQ12Vm8ts:IWvvdJ3Q", imports: [] },
      { name: "listening.field-recording", url: "/field-recording", imports: ["writing.protecting-quiet", "work.everywhen"] },
      { name: "about.contact",           url: "/contact",        imports: [] }
    ];

    const width = 500;
    const height = 500;
    const radius = width / 2;
    const innerRadius = radius - 120;

    const cluster = d3.cluster().size([360, innerRadius]);

    const line = d3.lineRadial()
      .curve(d3.curveCardinal.tension(0.5))
      .radius(d => d.y)
      .angle(d => d.x / 180 * Math.PI);

    const svg = d3.select("#bundle-svg")
      .attr("viewBox", [-radius, -radius, width, height].join(" "))
      .append("g");

    // Build hierarchy from dot-notation names.
    // Parent nodes are created implicitly — never put them in the data array.
    function packageHierarchy(classes) {
      var map = {};
      function find(name, data) {
        var node = map[name], i;
        if (!node) {
          node = map[name] = data || { name: name };
          node.children = node.children || [];
          if (name.length) {
            node.parent = find(name.substring(0, i = name.lastIndexOf(".")));
            node.parent.children = node.parent.children || [];
            node.parent.children.push(node);
            node.key = name.substring(i + 1);
          }
        }
        return node;
      }
      classes.forEach(function(d) {
        find(d.name, d);
      });
      return d3.hierarchy(map[""]);
    }

    // Resolve import names to paths through the tree (creates the curved edges)
    function packageImports(nodes) {
      var map = {}, imports = [];
      nodes.forEach(function(d) { map[d.data.name] = d; });
      nodes.forEach(function(d) {
        if (d.data.imports) d.data.imports.forEach(function(i) {
          if (map[i]) imports.push(map[d.data.name].path(map[i]));
        });
      });
      return imports;
    }

    var root = packageHierarchy(data).sum(function(d) { return 1; });
    cluster(root);

    // ─── Links (curved edges) ──────────────────────────────────────
    var link = svg.append("g").selectAll(".link")
      .data(packageImports(root.leaves()))
      .enter().append("path")
      .each(function(d) { d.source = d[0]; d.target = d[d.length - 1]; })
      .attr("class", "link")
      .attr("d", line);

    // ─── Nodes ─────────────────────────────────────────────────────
    var node = svg.append("g").selectAll(".node")
      .data(root.leaves())
      .enter().append("g")
      .attr("class", function(d) { return "node" + (d.data.url ? " child" : ""); })
      .attr("transform", function(d) {
        return "rotate(" + (d.x - 90) + ")translate(" + d.y + ",0)";
      })
      .on("click", function(event, d) {
        if (d.data.url) window.location.href = d.data.url;
      })
      .on("mouseover", function(event, d) {
        // Highlight connected edges on hover
        link.classed("link--source", function(l) { return l.source === d; })
            .classed("link--target", function(l) { return l.target === d; })
            .filter(function(l) { return l.source === d || l.target === d; }).raise();
        node.classed("node--target", function(n) { return n.target; })
            .classed("node--source", function(n) { return n.source; });
      })
      .on("mouseout", function() {
        link.classed("link--source", false).classed("link--target", false);
        node.classed("node--target", false).classed("node--source", false);
      });

    node.append("circle").attr("r", 5);

    node.append("text")
      .attr("dy", "0.31em")
      .attr("text-anchor", function(d) { return d.x < 180 ? "start" : "end"; })
      .attr("transform", function(d) { return d.x < 180 ? "translate(8,0)" : "translate(-8,0)rotate(180)"; })
      .text(function(d) { return d.data.key || d.data.name; });
  </script>
</body>
</html>
