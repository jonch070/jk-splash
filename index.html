<!DOCTYPE html>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

svg {
  overflow: visible;
}

.node {
  font: 400 13px "Helvetica Neue", Helvetica, Arial, sans-serif;
  fill: #2b2b5a;
  opacity: 0.35;
}

.node--link {
  opacity: 0.55;
  cursor: pointer;
}

.link {
  stroke: #70709e;
  stroke-opacity: 0.25;
  fill: none;
  pointer-events: none;
  stroke-width: 1px;
}

.link-hit {
  stroke: transparent;
  fill: none;
  pointer-events: visibleStroke;
  stroke-width: 8px;
  cursor: pointer;
}

.node:hover,
.node--source,
.node--target {
  opacity: 1;
}

.node--source { fill: #2b2b5a; }
.node--target { fill: #2b2b5a; }

.link--source,
.link--target {
  stroke: #DC866A;
  stroke-opacity: 0.9;
  stroke-width: 1px;
}

.link--source { stroke: #DC866A; }
.link--target { stroke: #DC866A; }

.link--visible {
  stroke-width: 1px;
  pointer-events: none;
}

.node--pinned { opacity: 1; }

@media (prefers-color-scheme: dark) {
  body { background: #0e0e0e; }

  .node { fill: #c8c8d8; }
  .node:hover { fill: #e8e8f0; }
  .node--source { fill: #e8e8f0; }
  .node--target { fill: #e8e8f0; }

  .link {
    stroke: #6060a0;
    stroke-opacity: 0.2;
  }

  .link--source,
  .link--target {
    stroke: #DC866A;
    stroke-opacity: 0.9;
  }
}

/* EXPERIMENT: ?experiment in URL — unified color at rest, white on highlight */
body.experiment {
  background: #0e0e0e;
}

body.experiment .node {
  fill: #999999;
  opacity: 0.5;
}

body.experiment .node--link {
  opacity: 0.65;
}

body.experiment .link {
  stroke: #999999;
  stroke-opacity: 0.3;
}

body.experiment .node:hover,
body.experiment .node--source,
body.experiment .node--target {
  fill: #ffffff;
  opacity: 1;
}

body.experiment .link--source,
body.experiment .link--target {
  stroke: #ffffff;
  stroke-opacity: 0.9;
}
</style>
<body>
<script src="https://d3js.org/d3.v4.min.js"></script>
<script>

// Mobile redirect
if (window.innerWidth < 768) {
  window.location.replace("http://jonathankawchuk.com/home");
}

// Experiment mode: add ?experiment to URL to preview
if (window.location.search.indexOf("experiment") > -1) {
  document.body.classList.add("experiment");
}

// Dynamic sizing
var diameter = Math.max(Math.min(window.innerWidth, window.innerHeight) * 0.95, 700),
    radius = diameter / 2,
    innerRadius = radius - 140;

var cluster = d3.cluster()
    .size([360, innerRadius]);

var line = d3.radialLine()
    .curve(d3.curveBundle.beta(0.85))
    .radius(function(d) { return d.y; })
    .angle(function(d) { return d.x / 180 * Math.PI; });

var svg = d3.select("body").append("svg")
    .attr("width", diameter)
    .attr("height", diameter)
  .append("g")
    .attr("transform", "translate(" + radius + "," + radius + ")");

// Background rect to catch deselect clicks
svg.append("rect")
    .attr("width", diameter)
    .attr("height", diameter)
    .attr("x", -radius)
    .attr("y", -radius)
    .attr("fill", "none")
    .attr("pointer-events", "all")
    .on("click", function() {
      if (pinned) { pinned = null; mouseouted(); }
    });

var linkHit = svg.append("g").selectAll(".link-hit"),
    link    = svg.append("g").selectAll(".link"),
    node    = svg.append("g").selectAll(".node");

var pinned = null;

d3.text("graph.md?v=" + Date.now(), function(error, text) {
  if (error) throw error;
  var classes = parseGraph(text);

  var root = packageHierarchy(classes)
      .sum(function(d) { return d.size; });

  cluster(root);

  var linkData = packageImports(root.leaves());

  link = link
    .data(linkData)
    .enter().append("path")
      .each(function(d) { d.source = d[0]; d.target = d[d.length - 1]; })
      .attr("class", "link")
      .attr("d", line);

  // Invisible fat hit layer on top
  linkHit = linkHit
    .data(linkData)
    .enter().append("path")
      .each(function(d) { d.source = d[0]; d.target = d[d.length - 1]; })
      .attr("class", "link-hit")
      .attr("d", line)
      .on("mouseover", function(d) {
        if (!pinned) mouseoveredLink(d);
      })
      .on("mouseout", function(d) {
        if (!pinned) mouseouted();
      })
      .on("click", function(d) {
        d3.event.stopPropagation();
        if (pinned === d) { pinned = null; mouseouted(); }
        else { if (pinned) mouseouted(); pinned = d; mouseoveredLink(d); }
      });

  node = node
    .data(root.leaves())
    .enter().append("text")
      .attr("class", function(d) {
        return "node" + (d.data.url ? " node--link" : "");
      })
      .attr("dy", "0.31em")
      .attr("transform", function(d) {
        return "rotate(" + (d.x - 90) + ")translate(" + (d.y + 10) + ",0)" + (d.x < 180 ? "" : "rotate(180)");
      })
      .attr("text-anchor", function(d) { return d.x < 180 ? "start" : "end"; })
      .text(function(d) { return d.data.key; })
      .on("mouseover", function(d) {
        if (!pinned) mouseovered(d);
      })
      .on("mouseout", function() {
        if (!pinned) mouseouted();
      })
      .on("click", function(d) {
        d3.event.stopPropagation();
        if (d.data.url) { window.open(d.data.url, "_blank"); return; }
        if (pinned === d) {
          pinned = null; mouseouted();
        } else {
          if (pinned) mouseouted();
          pinned = d;
          node.classed("node--pinned", function(n) { return n === d; });
          mouseovered(d);
        }
      });
});

function mouseovered(d) {
  node.each(function(n) { n.target = n.source = false; });

  link
    .classed("link--target", function(l) {
      if (l.target === d) return l.source.source = true;
    })
    .classed("link--source", function(l) {
      if (l.source === d) return l.target.target = true;
    })
    .filter(function(l) { return l.target === d || l.source === d; })
    .raise();

  node
    .classed("node--target", function(n) { return n.target; })
    .classed("node--source", function(n) { return n.source; });
}

function mouseoveredLink(l) {
  node.each(function(n) { n.target = n.source = false; });
  l.source.source = true;
  l.target.target = true;

  link
    .classed("link--source", function(d) { return d === l; })
    .classed("link--target", function(d) { return d === l; })
    .filter(function(d) { return d === l; })
    .raise();

  node
    .classed("node--source", function(n) { return n === l.source; })
    .classed("node--target", function(n) { return n === l.target; });
}

function mouseouted() {
  link
    .classed("link--target", false)
    .classed("link--source", false);
  node
    .classed("node--target", false)
    .classed("node--source", false)
    .classed("node--pinned", false);
}

// Parse graph.md into Bostock flat-class structure
function parseGraph(text) {
  var nodeCat = {}, nodeUrl = {}, edges = {}, order = [];
  var section = null;

  text.split(/\r?\n/).forEach(function(raw) {
    var line = raw.trim();
    if (!line || line.startsWith("//")) return;
    if (line.charAt(0) === "#") {
      if (/nodes/i.test(line)) section = "nodes";
      else if (/connections/i.test(line)) section = "edges";
      return;
    }
    if (section === "nodes") {
      var m = line.match(/^\[([^\]]+)\]\s*(.+?)(?:\s*\|\s*(.+))?$/);
      if (m) {
        var name = m[2].trim();
        nodeCat[name] = m[1].trim();
        nodeUrl[name] = m[3] ? m[3].trim() : null;
        order.push(name);
      }
    } else if (section === "edges") {
      var p = line.split("->");
      if (p.length === 2) {
        var src = p[0].trim();
        var tgts = p[1].split(",").map(function(s) { return s.trim(); }).filter(Boolean);
        if (!edges[src]) edges[src] = [];
        tgts.forEach(function(t) {
          if (edges[src].indexOf(t) < 0) edges[src].push(t);
          if (!edges[t]) edges[t] = [];
          if (edges[t].indexOf(src) < 0) edges[t].push(src);
        });
      }
    }
  });

  function path(name) {
    return "graph." + (nodeCat[name] || "other") + "." + name;
  }

  return order.map(function(name) {
    return {
      name: path(name),
      key: name,
      url: nodeUrl[name] || null,
      size: 1000,
      imports: (edges[name] || []).map(path)
    };
  });
}

function packageHierarchy(classes) {
  var map = {};

  function find(name, data) {
    var node = map[name], i;
    if (!node) {
      node = map[name] = data || { name: name, children: [] };
      if (name.length) {
        node.parent = find(name.substring(0, i = name.lastIndexOf(".")));
        node.parent.children.push(node);
        node.key = name.substring(i + 1);
      }
    }
    return node;
  }

  classes.forEach(function(d) { find(d.name, d); });
  return d3.hierarchy(map[""]);
}

function packageImports(nodes) {
  var map = {}, imports = [];
  nodes.forEach(function(d) { map[d.data.name] = d; });
  nodes.forEach(function(d) {
    if (d.data.imports) d.data.imports.forEach(function(i) {
      if (map[i]) imports.push(map[d.data.name].path(map[i]));
    });
  });
  return imports;
}
</script>
</body>
</html>
