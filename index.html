<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jonathan Kawchuk — Composer & Sound Artist</title>
  <meta name="description" content="Composer, sound artist, field recordist. Founder of Quiet Parks International. Emmy-winning, 2x CASMA. Based in Canada.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' width='100' height='100'/><text y='70' x='50%' text-anchor='middle' fill='%23fff' font-size='60'>⛰</text></svg>">
  <style>
    @font-face {
      font-family: 'Dax';
      src: url('fonts/Dax Regular/Dax Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #e8e6e1;
    }

    html {
      display: table;
      margin: auto;
    }

    body {
      display: table-cell;
      vertical-align: middle;
      font-family: 'Dax', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    svg { display: block; }

    .node {
      font: 300 11px 'Dax', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      fill: #1a1a1a;
      opacity: 0.5;
      cursor: pointer;
    }

    .node:hover {
      opacity: 1;
    }

    .link {
      stroke: steelblue;
      stroke-opacity: 0.4;
      fill: none;
      pointer-events: none;
    }

    .node--source {
      fill: #2ca02c;
      opacity: 1;
    }

    .node--target {
      fill: #d62728;
      opacity: 1;
    }

    .link--source,
    .link--target {
      stroke-opacity: 1;
      stroke-width: 2px;
    }

    .link--source {
      stroke: #d62728;
    }

    .link--target {
      stroke: #2ca02c;
    }
  </style>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<script>

var diameter = 600,
    radius = diameter / 2,
    innerRadius = radius - 120;

var cluster = d3.cluster()
    .size([360, innerRadius]);

var line = d3.lineRadial()
    .curve(d3.curveBundle.beta(0.85))
    .radius(function(d) { return d.y; })
    .angle(function(d) { return d.x / 180 * Math.PI; });

var svg = d3.select("body").append("svg")
    .attr("width", diameter)
    .attr("height", diameter)
  .append("g")
    .attr("transform", "translate(" + radius + "," + radius + ")");

var link = svg.append("g").selectAll(".link"),
    node = svg.append("g").selectAll(".node");

// ─── Data ──────────────────────────────────────────────────────
// Only leaf nodes. Parents auto-created from dot notation.
// "imports" = cross-branch connections (curved bundled edges).
var classes = [
  {name: "work.everywhen",            imports: ["work.installation", "listening.reelcrafted", "listening.field-recording"], url: "/everywhen"},
  {name: "work.north",                imports: ["listening.reelcrafted", "listening.field-recording"], url: "/north"},
  {name: "work.installation",         imports: ["work.everywhen"], url: "/installation"},
  {name: "writing.protecting-quiet",  imports: ["listening.field-recording", "work.everywhen"], url: "https://thenarwhal.ca/protecting-quiet-spaces-natural-sounds/"},
  {name: "listening.reelcrafted",     imports: ["work.everywhen", "work.north"], url: "https://play.reelcrafter.com/COSlb0PsRdWZ8v-mTQevfw"},
  {name: "listening.emp",             imports: ["listening.reelcrafted"], url: "https://emp.disco.ac/playlist-new/18442280?date=20240821&user_id=188042&signature=Hd2IqQansjJK2Iu9NEdQ12Vm8ts:IWvvdJ3Q"},
  {name: "listening.field-recording", imports: ["writing.protecting-quiet", "work.everywhen", "work.north"], url: "/field-recording"},
  {name: "about.contact",            imports: [], url: "/contact"}
];

// ─── Hierarchy builder (Bostock pattern) ───────────────────────
function packageHierarchy(classes) {
  var map = {};

  function find(name, data) {
    var node = map[name], i;
    if (!node) {
      node = map[name] = data || {name: name, children: []};
      node.children = node.children || [];
      if (name.length) {
        node.parent = find(name.substring(0, i = name.lastIndexOf(".")));
        node.parent.children = node.parent.children || [];
        node.parent.children.push(node);
        node.key = name.substring(i + 1);
      }
    }
    return node;
  }

  classes.forEach(function(d) {
    find(d.name, d);
  });

  return d3.hierarchy(map[""]);
}

// Resolve imports to paths through the hierarchy (creates bundled edges)
function packageImports(nodes) {
  var map = {}, imports = [];

  nodes.forEach(function(d) {
    map[d.data.name] = d;
  });

  nodes.forEach(function(d) {
    if (d.data.imports) d.data.imports.forEach(function(i) {
      if (map[i]) {
        imports.push(map[d.data.name].path(map[i]));
      }
    });
  });

  return imports;
}

// ─── Build ─────────────────────────────────────────────────────
var root = packageHierarchy(classes)
    .sum(function(d) { return d.size; });

cluster(root);

link = link
  .data(packageImports(root.leaves()))
  .enter().append("path")
    .each(function(d) { d.source = d[0]; d.target = d[d.length - 1]; })
    .attr("class", "link")
    .attr("d", line);

node = node
  .data(root.leaves())
  .enter().append("text")
    .attr("class", "node")
    .attr("dy", "0.31em")
    .attr("transform", function(d) {
      return "rotate(" + (d.x - 90) + ")translate(" + (d.y + 8) + ",0)"
        + (d.x < 180 ? "" : "rotate(180)");
    })
    .attr("text-anchor", function(d) { return d.x < 180 ? "start" : "end"; })
    .text(function(d) { return d.data.key; })
    .on("mouseover", mouseovered)
    .on("mouseout", mouseouted)
    .on("click", function(event, d) {
      if (d.data.url) window.location.href = d.data.url;
    });

// ─── Hover interaction (Bostock pattern) ───────────────────────
function mouseovered(event, d) {
  node.each(function(n) { n.target = n.source = false; });

  link
    .classed("link--target", function(l) {
      if (l.target === d) return l.source.source = true;
    })
    .classed("link--source", function(l) {
      if (l.source === d) return l.target.target = true;
    })
    .filter(function(l) { return l.target === d || l.source === d; })
    .raise();

  node
    .classed("node--target", function(n) { return n.target; })
    .classed("node--source", function(n) { return n.source; });
}

function mouseouted(event, d) {
  link
    .classed("link--target", false)
    .classed("link--source", false);

  node
    .classed("node--target", false)
    .classed("node--source", false);
}

</script>
</body>
</html>
