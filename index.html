<!DOCTYPE html>
<meta charset="utf-8">
<style>
.node {
  font: 300 11px "Helvetica Neue", Helvetica, Arial, sans-serif;
  fill: #2b2b5a;
  opacity: 0.35;
}

.node:hover {
  fill: #2b2b5a;
}

.link {
  stroke: #70709e;
  stroke-opacity: 0.25;
  fill: none;
  pointer-events: none;
  stroke-width: 1px;
}

.node:hover,
.node--source,
.node--target {
  font-weight: 300;
  opacity: 1;
}

.node--source {
  fill: #2b2b5a;
}

.node--target {
  fill: #2b2b5a;
}

.link--source,
.link--target {
  stroke: #DC866A;
  stroke-opacity: 0.9;
  stroke-width: 1px;
}

.link--source {
  stroke: #DC866A;
}

.link--target {
  stroke: #DC866A;
}

html, body {
  height: 100%;
}

html {
  display: table;
  margin: auto;
}

body {
  display: table-cell;
  vertical-align: top;
}
</style>
<body>
<script src="https://d3js.org/d3.v4.min.js"></script>
<script>
var diameter = 960,
    radius = diameter / 2,
    innerRadius = radius - 120;

var cluster = d3.cluster()
    .size([360, innerRadius]);

var line = d3.radialLine()
    .curve(d3.curveBundle.beta(0.85))
    .radius(function(d) { return d.y; })
    .angle(function(d) { return d.x / 180 * Math.PI; });

var svg = d3.select("body").append("svg")
    .attr("width", diameter)
    .attr("height", diameter)
  .append("g")
    .attr("transform", "translate(" + radius + "," + radius + ")");

var link = svg.append("g").selectAll(".link"),
    node = svg.append("g").selectAll(".node");

d3.text("graph.md", function(error, text) {
  if (error) throw error;
  var classes = parseGraph(text);

  var root = packageHierarchy(classes)
      .sum(function(d) { return d.size; });

  cluster(root);

  link = link
    .data(packageImports(root.leaves()))
    .enter().append("path")
      .each(function(d) { d.source = d[0], d.target = d[d.length - 1]; })
      .attr("class", "link")
      .attr("d", line);

  node = node
    .data(root.leaves())
    .enter().append("text")
      .attr("class", "node")
      .attr("dy", "0.31em")
      .attr("transform", function(d) { return "rotate(" + (d.x - 90) + ")translate(" + (d.y + 8) + ",0)" + (d.x < 180 ? "" : "rotate(180)"); })
      .attr("text-anchor", function(d) { return d.x < 180 ? "start" : "end"; })
      .text(function(d) { return d.data.key; })
      .on("mouseover", mouseovered)
      .on("mouseout", mouseouted);
});

function mouseovered(d) {
  node
      .each(function(n) { n.target = n.source = false; });

  link
      .classed("link--target", function(l) { if (l.target === d) return l.source.source = true; })
      .classed("link--source", function(l) { if (l.source === d) return l.target.target = true; })
    .filter(function(l) { return l.target === d || l.source === d; })
      .raise();

  node
      .classed("node--target", function(n) { return n.target; })
      .classed("node--source", function(n) { return n.source; });
}

function mouseouted(d) {
  link
      .classed("link--target", false)
      .classed("link--source", false);

  node
      .classed("node--target", false)
      .classed("node--source", false);
}

// Parse human-editable graph.md into Bostock's flat-class structure.
// Format:
//   [category] Display Name
//   Display Name -> other, other, other
function parseGraph(text) {
  var nodeCat = {}, edges = {}, order = [];
  var section = null;
  text.split(/\r?\n/).forEach(function(raw) {
    var line = raw.trim();
    if (!line || line.charAt(0) === "#") {
      if (/^#\s*nodes/i.test(line)) section = "nodes";
      else if (/^#\s*connections/i.test(line)) section = "edges";
      return;
    }
    if (section === "nodes") {
      var m = line.match(/^\[([^\]]+)\]\s*(.+)$/);
      if (m) { nodeCat[m[2].trim()] = m[1].trim(); order.push(m[2].trim()); }
    } else if (section === "edges") {
      var p = line.split("->");
      if (p.length === 2) {
        var src = p[0].trim();
        var tgts = p[1].split(",").map(function(s){return s.trim();}).filter(Boolean);
        if (!edges[src]) edges[src] = [];
        tgts.forEach(function(t) {
          if (edges[src].indexOf(t) < 0) edges[src].push(t);
          if (!edges[t]) edges[t] = [];
          if (edges[t].indexOf(src) < 0) edges[t].push(src);
        });
      }
    }
  });
  function path(name) {
    var cat = nodeCat[name] || "uncategorized";
    return "graph." + cat + "." + name;
  }
  return order.map(function(name) {
    return {
      name: path(name),
      size: 1000,
      imports: (edges[name] || []).map(path)
    };
  });
}

// Lazily construct the package hierarchy from class names.
function packageHierarchy(classes) {
  var map = {};

  function find(name, data) {
    var node = map[name], i;
    if (!node) {
      node = map[name] = data || {name: name, children: []};
      if (name.length) {
        node.parent = find(name.substring(0, i = name.lastIndexOf(".")));
        node.parent.children.push(node);
        node.key = name.substring(i + 1);
      }
    }
    return node;
  }

  classes.forEach(function(d) {
    find(d.name, d);
  });

  return d3.hierarchy(map[""]);
}

// Return a list of imports for the given array of nodes.
function packageImports(nodes) {
  var map = {},
      imports = [];

  // Compute a map from name to node.
  nodes.forEach(function(d) {
    map[d.data.name] = d;
  });

  // For each import, construct a link from the source to target node.
  nodes.forEach(function(d) {
    if (d.data.imports) d.data.imports.forEach(function(i) {
      imports.push(map[d.data.name].path(map[i]));
    });
  });

  return imports;
}
</script>
</body>
</html>
