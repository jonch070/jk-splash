<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jonathan Kawchuk</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #e8e6e1;
    }
    html {
      display: table;
      margin: auto;
    }
    body {
      display: table-cell;
      vertical-align: middle;
      font-family: 'Dax', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    svg {
      display: block;
    }
    .node {
      font: 300 12px 'Dax', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      fill: #1a1a1a;
      opacity: 0.4;
      cursor: pointer;
    }
    .node:hover {
      opacity: 1;
    }
    .link {
      stroke: #666;
      stroke-opacity: 0.25;
      fill: none;
      pointer-events: none;
    }
    .node--source, .node--target {
      opacity: 1;
    }
    .link--source, .link--target {
      stroke: #DC866A;
      stroke-opacity: 0.9;
    }
  </style>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<script>
  var diameter = 600,
      radius = diameter / 2,
      innerRadius = radius - 100;

  var cluster = d3.cluster()
      .size([360, innerRadius]);

  var line = d3.radialLine()
      .curve(d3.curveCardinal.tension(0.5))
      .radius(function(d) { return d.y; })
      .angle(function(d) { return d.x / 180 * Math.PI; });

  var svg = d3.select("body").append("svg")
      .attr("width", diameter)
      .attr("height", diameter)
    .append("g")
      .attr("transform", "translate(" + radius + "," + radius + ")");

  var link = svg.append("g").selectAll(".link"),
      node = svg.append("g").selectAll(".node");

  var data = [
    {name: "work", imports: ["work.everywhen", "work.north", "work.installation"]},
    {name: "work.everywhen", url: "https://jonathankawchuk.com/everywhen"},
    {name: "work.north", url: "https://jonathankawchuk.com/north"},
    {name: "work.installation", url: "https://jonathankawchuk.com/installation"},
    {name: "writing", imports: ["writing.narwhal"]},
    {name: "writing.narwhal", url: "https://thenarwhal.ca/protecting-quiet-spaces-natural-sounds/"},
    {name: "listening", imports: ["listening.reelcrafted", "listening.emp"]},
    {name: "listening.reelcrafted", url: "https://play.reelcrafter.com/COSlb0PsRdWZ8v-mTQevfw"},
    {name: "listening.emp", url: "https://emp.disco.ac/playlist-new/18442280?date=20240821&user_id=188042&signature=Hd2IqQansjJK2Iu9NEdQ12Vm8ts:IWvvdJ3Q"},
    {name: "contact", url: "https://jonathankawchuk.com/contact"}
  ];

  var root = packageHierarchy(data).sum(function(d) { return 1; });
  cluster(root);

  link = link
    .data(packageImports(root.leaves()))
    .enter().append("path")
      .each(function(d) { d.source = d[0], d.target = d[d.length - 1]; })
      .attr("class", "link")
      .attr("d", line);

  node = node
    .data(root.leaves())
    .enter().append("text")
      .attr("class", "node")
      .attr("dy", "0.31em")
      .attr("transform", function(d) { return "rotate(" + (d.x - 90) + ")translate(" + (d.y + 8) + ",0)" + (d.x < 180 ? "" : "rotate(180)"); })
      .attr("text-anchor", function(d) { return d.x < 180 ? "start" : "end"; })
      .text(function(d) { return d.data.key; })
      .on("mouseover", mouseovered)
      .on("mouseout", mouseouted)
      .on("click", function(event, d) {
        if (d.data.url) window.location.href = d.data.url;
      });

  function mouseovered(d) {
    node.each(function(n) { n.target = n.source = false; });
    link
      .classed("link--target", function(l) { if (l.target === d) return l.source.source = true; })
      .classed("link--source", function(l) { if (l.source === d) return l.target.target = true; })
    .filter(function(l) { return l.target === d || l.source === d; })
      .raise();
    node
      .classed("node--target", function(n) { return n.target; })
      .classed("node--source", function(n) { return n.source; });
  }

  function mouseouted(d) {
    link
      .classed("link--target", false)
      .classed("link--source", false);
    node
      .classed("node--target", false)
      .classed("node--source", false);
  }

  function packageHierarchy(classes) {
    var map = {};
    function find(name, data) {
      var node = map[name], i;
      if (!node) {
        node = map[name] = data || {name: name, children: []};
        if (name.length) {
          node.parent = find(name.substring(0, i = name.lastIndexOf(".")));
          node.parent.children.push(node);
          node.key = name.substring(i + 1);
        }
      }
      return node;
    }
    classes.forEach(function(d) {
      find(d.name, d);
    });
    return d3.hierarchy(map[""]);
  }

  function packageImports(nodes) {
    var map = {}, imports = [];
    nodes.forEach(function(d) {
      map[d.data.name] = d;
    });
    nodes.forEach(function(d) {
      if (d.data.imports) d.data.imports.forEach(function(i) {
        if (map[i]) imports.push(map[d.data.name].path(map[i]));
      });
    });
    return imports;
  }
</script>
</body>
</html>
