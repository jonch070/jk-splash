<!DOCTYPE html>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0e0e0e;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

svg { overflow: visible; }

.node {
  font: 400 12px "Helvetica Neue", Helvetica, Arial, sans-serif;
  fill: #888;
  cursor: default;
}

.node--link { cursor: pointer; fill: #aaa; }

.link {
  fill: none;
  stroke: #444;
  stroke-opacity: 0.45;
  stroke-width: 1px;
  pointer-events: none;
}

.node--source,
.node--target { fill: #ffffff; }

.link--source,
.link--target {
  stroke: #ffffff;
  stroke-opacity: 0.85;
}
</style>
<body>
<script src="https://d3js.org/d3.v4.min.js"></script>
<script>

// Left categories / Right categories
var LEFT_CATS  = ["medium", "main"];
var RIGHT_CATS = ["utility", "external", "social", "albums"];

var W = Math.max(window.innerWidth,  900),
    H = Math.max(window.innerHeight, 600);

var leftX  = 60,
    rightX = W - 60,
    spineX = W / 2;   // bundling spine

var svg = d3.select("body").append("svg")
    .attr("width", W).attr("height", H);

var linkLayer = svg.append("g"),
    nodeLayer = svg.append("g");

var pinned = null;

d3.text("graph.md", function(error, text) {
  if (error) throw error;

  // Parse nodes
  var parsed  = parseGraph(text);
  var nodeMap = {};

  var leftNodes  = parsed.filter(function(d) { return LEFT_CATS.indexOf(d.category)  > -1; });
  var rightNodes = parsed.filter(function(d) { return RIGHT_CATS.indexOf(d.category) > -1; });

  var pad = 60;

  // Vertical distribution
  leftNodes.forEach(function(d, i) {
    d.px = leftX;
    d.py = pad + i * (H - pad * 2) / Math.max(leftNodes.length - 1, 1);
    nodeMap[d.key] = d;
  });
  rightNodes.forEach(function(d, i) {
    d.px = rightX;
    d.py = pad + i * (H - pad * 2) / Math.max(rightNodes.length - 1, 1);
    nodeMap[d.key] = d;
  });

  // Build edge list from imports (deduplicate)
  var edgeSet = {};
  var edges = [];
  parsed.forEach(function(src) {
    (src.imports || []).forEach(function(imp) {
      var tgtKey = imp.split(".").pop();
      var tgt = nodeMap[tgtKey];
      if (!tgt || !nodeMap[src.key]) return;
      var id = [src.key, tgtKey].sort().join("||");
      if (!edgeSet[id]) {
        edgeSet[id] = true;
        edges.push({ s: nodeMap[src.key], t: tgt });
      }
    });
  });

  // Line with bundle curve — path goes through spine control points
  var bundleLine = d3.line()
      .curve(d3.curveBundle.beta(0.85))
      .x(function(d) { return d[0]; })
      .y(function(d) { return d[1]; });

  function edgePath(s, t) {
    // Route: source → (spineX, source.py) → (spineX, target.py) → target
    // This gives the bundling effect along the central spine
    return bundleLine([
      [s.px, s.py],
      [spineX, s.py],
      [spineX, t.py],
      [t.px, t.py]
    ]);
  }

  // Draw edges
  var link = linkLayer.selectAll(".link")
    .data(edges)
    .enter().append("path")
      .attr("class", "link")
      .attr("d", function(e) { return edgePath(e.s, e.t); });

  // Draw nodes
  var nodeG = nodeLayer.selectAll("g")
    .data(parsed.filter(function(d) { return d.px !== undefined; }))
    .enter().append("g");

  nodeG.append("text")
    .attr("class", function(d) { return "node" + (d.url ? " node--link" : ""); })
    .attr("x", function(d) {
      return LEFT_CATS.indexOf(d.category) > -1 ? d.px - 10 : d.px + 10;
    })
    .attr("y", function(d) { return d.py; })
    .attr("dy", "0.35em")
    .attr("text-anchor", function(d) {
      return LEFT_CATS.indexOf(d.category) > -1 ? "end" : "start";
    })
    .text(function(d) { return d.key; })
    .on("mouseover", function(d) { if (!pinned) mouseovered(d, link, nodeG); })
    .on("mouseout",  function(d) { if (!pinned) mouseouted(link, nodeG); })
    .on("click", function(d) {
      if (d.url) { window.open(d.url, "_blank"); return; }
      if (pinned === d) { pinned = null; mouseouted(link, nodeG); }
      else { if (pinned) mouseouted(link, nodeG); pinned = d; mouseovered(d, link, nodeG); }
    });
});

function mouseovered(d, link, nodeG) {
  var connected = {};
  connected[d.key] = true;

  link.classed("link--source", function(e) {
    if (e.s.key === d.key) { connected[e.t.key] = true; return true; }
    if (e.t.key === d.key) { connected[e.s.key] = true; return true; }
    return false;
  });
  link.classed("link--target", function(e) {
    return e.s.key === d.key || e.t.key === d.key;
  });

  nodeG.selectAll("text")
    .classed("node--source", function(n) { return connected[n.key]; })
    .classed("node--target", function(n) { return connected[n.key]; });
}

function mouseouted(link, nodeG) {
  link.classed("link--source", false).classed("link--target", false);
  nodeG.selectAll("text").classed("node--source", false).classed("node--target", false);
}

function parseGraph(text) {
  var nodeCat = {}, nodeUrl = {}, edges = {}, order = [];
  var section = null;
  text.split(/\r?\n/).forEach(function(raw) {
    var line = raw.trim();
    if (!line || line.startsWith("//")) return;
    if (line.charAt(0) === "#") {
      if (/nodes/i.test(line)) section = "nodes";
      else if (/connections/i.test(line)) section = "edges";
      return;
    }
    if (section === "nodes") {
      var m = line.match(/^\[([^\]]+)\]\s*(.+?)(?:\s*\|\s*(.+))?$/);
      if (m) {
        var name = m[2].trim();
        nodeCat[name] = m[1].trim();
        nodeUrl[name] = m[3] ? m[3].trim() : null;
        order.push(name);
      }
    } else if (section === "edges") {
      var p = line.split("->");
      if (p.length === 2) {
        var src = p[0].trim();
        var tgts = p[1].split(",").map(function(s) { return s.trim(); }).filter(Boolean);
        if (!edges[src]) edges[src] = [];
        tgts.forEach(function(t) {
          if (edges[src].indexOf(t) < 0) edges[src].push(t);
          if (!edges[t]) edges[t] = [];
          if (edges[t].indexOf(src) < 0) edges[t].push(src);
        });
      }
    }
  });
  function path(name) { return "graph." + (nodeCat[name] || "other") + "." + name; }
  return order.map(function(name) {
    return { name: path(name), key: name, category: nodeCat[name],
             url: nodeUrl[name] || null, size: 1000,
             imports: (edges[name] || []).map(path) };
  });
}
</script>
</body>
</html>
